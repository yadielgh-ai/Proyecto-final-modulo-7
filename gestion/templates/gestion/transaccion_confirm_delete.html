{% extends 'gestion/base.html' %}

{% block content %}
    <h2>Confirmar Eliminación</h2>
    <p>¿Estás seguro de que deseas eliminar la transacción <strong>#{{ object.id }} ({{ object.tipo }} de ${{ object.monto }})</strong>?</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Sí, eliminar</button>
        <a href="{% url 'transaccion_list' %}" class="btn">Cancelar</a>
    </form>
{% endblock %}
