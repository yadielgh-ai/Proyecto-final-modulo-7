{% extends 'gestion/base.html' %}

{% block content %}
    <h2>{% if object %}Editar Cliente{% else %}Nuevo Cliente{% endif %}</h2>

    <form method="post">
        {% csrf_token %}
        
        {{ form.as_p }}
        
        <button type="submit" class="btn">Guardar</button>
        <a href="{% url 'cliente_list' %}" class="btn">Cancelar</a>
    </form>
{% endblock %}
