{% extends 'gestion/base.html' %}

{% block content %}
    <h2>Confirmar Eliminación</h2>
    <p>¿Estás seguro de que deseas eliminar la cuenta <strong>#{{ object.id }}</strong> perteneciente a <strong>{{ object.cliente.nombre }}</strong>?</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Sí, eliminar</button>
        <a href="{% url 'cuenta_list' %}" class="btn">Cancelar</a>
    </form>
{% endblock %}
