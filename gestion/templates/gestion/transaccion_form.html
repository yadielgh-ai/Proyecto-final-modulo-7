{% extends 'gestion/base.html' %}

{% block content %}
    <h2>{% if object %}Editar Transacción{% else %}Registrar Transacción{% endif %}</h2>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        
        <button type="submit" class="btn">Guardar</button>
        <a href="{% url 'transaccion_list' %}" class="btn">Cancelar</a>
    </form>
{% endblock %}
