{% extends 'gestion/base.html' %}

{% block content %}
    <h2>Confirmar Eliminación</h2>
    <p>¿Estás seguro de que deseas eliminar al cliente "<strong>{{ object.nombre }}</strong>"? Esta acción no se puede deshacer.</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Sí, eliminar</button>
        <a href="{% url 'cliente_list' %}" class="btn">Cancelar</a>
    </form>
{% endblock %}
